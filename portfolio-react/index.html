<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Himanshu Nakrani | AI Engineer</title>
    <meta name="description" content="Generative AI Engineer — LLMs, RAG, Text-to-SQL, AI Agents. Senior Associate at State Street Corporation." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <meta name="theme-color" content="#0a192f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8f9fc" media="(prefers-color-scheme: light)" />
    <link rel="preload" as="image" href="/himanshu.jpg" fetchpriority="high" />
    <!-- Blocking theme script: runs before first paint to prevent FOUC -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        // Default to dark (matches the deep navy design)
        var theme = (stored === 'light' || stored === 'dark')
          ? stored
          : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <!-- GitHub Pages SPA redirect decoder (pairs with 404.html) -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        } else {
          var l = window.location;
          if (l.search[1] === '/') {
            var decoded =
              l.search.slice(1).split('&')
              .map(function (s) { return s.replace(/~and~/g, '&'); })
              .join('?');
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
            );
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
