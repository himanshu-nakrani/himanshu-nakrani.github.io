<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Himanshu Nakrani | AI Engineer</title>
    <meta name="description" content="Generative AI Engineer — LLMs, RAG, Text-to-SQL, AI Agents. Senior Associate at State Street Corporation." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <meta name="theme-color" content="#0a0d14" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4f5f8" media="(prefers-color-scheme: light)" />
    <!-- Blocking theme script: runs before first paint to prevent FOUC -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        var theme = (stored === 'light' || stored === 'dark')
          ? stored
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
