name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-react
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: portfolio-react/pnpm-lock.yaml
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: portfolio-react/package.json
          run_install: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: npx vitest run
      - run: pnpm run build
